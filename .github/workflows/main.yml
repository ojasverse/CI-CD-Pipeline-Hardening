name: Secure CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: node app.js

      - name: Secure Secret Usage
        run: echo "Running securely"
        env:
          PASSWORD: ${{ secrets.APP_PASSWORD }}
